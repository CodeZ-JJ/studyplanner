<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyPlan - Smart Study Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

  <!-- Auth Page (Login + Register) -->
  <div id="authPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700 p-4">
    <div class="bg-white dark:bg-gray-900 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-indigo-600">📚 StudyPlan</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Smart Digital Study Planner</p>
      </div>
      
      <!-- Tab Toggle -->
      <div class="flex mb-8 border-b border-gray-200 dark:border-gray-700">
        <button onclick="showLogin()" id="loginTab"
                class="flex-1 py-3 font-medium border-b-2 border-indigo-600 text-indigo-600">Login</button>
        <button onclick="showRegister()" id="registerTab"
                class="flex-1 py-3 font-medium text-gray-500 dark:text-gray-400">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <input id="loginEmail" type="email" value="justice@student.edu.ng"
               class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 focus:border-indigo-500 mb-4" placeholder="Email"/>
        <input id="loginPassword" type="password" value="123456"
               class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 focus:border-indigo-500 mb-6" placeholder="Password"/>
        <button onclick="login()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
          Login
        </button>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="hidden">
        <input id="regFullName" type="text"
               class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 focus:border-indigo-500 mb-4" placeholder="Full Name"/>
        <input id="regEmail" type="email"
               class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 focus:border-indigo-500 mb-4" placeholder="Email"/>
        <input id="regPassword" type="password"
               class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 focus:border-indigo-500 mb-6" placeholder="Create Password"/>
        <button onclick="registerUser()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
          Create Account
        </button>
      </div>

      <p class="text-center text-sm text-gray-500 mt-6" id="demoText">
        Demo: justice@student.edu.ng / 123456
      </p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden flex h-screen flex-col md:flex-row">

    <!-- Sidebar -->
    <div id="sidebar" class="w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 flex flex-col fixed md:static h-full z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="p-6 border-b border-gray-200 dark:border-gray-700">
        <h1 class="text-3xl font-bold text-indigo-600">📚 StudyPlan</h1>
      </div>
     
      <nav class="flex-1 p-4">
        <ul class="space-y-1">
          <li><a onclick="navigate('dashboard')" id="nav-dashboard" class="nav-link active flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-home"></i> Dashboard</a></li>
          <li><a onclick="navigate('today')" id="nav-today" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-calendar-day"></i> Today's Tasks</a></li>
          <li><a onclick="navigate('schedule')" id="nav-schedule" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-calendar-week"></i> Weekly Schedule</a></li>
          <li><a onclick="navigate('all')" id="nav-all" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-tasks"></i> All Tasks</a></li>
        </ul>
      </nav>

      <div class="p-6 border-t border-gray-200 dark:border-gray-700">
        <div class="bg-indigo-50 dark:bg-indigo-950 rounded-2xl p-5 text-center">
          <p class="text-sm text-indigo-600 dark:text-indigo-400">Current Streak</p>
          <p id="streak" class="text-4xl font-bold text-indigo-600">9 days 🔥</p>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <header class="h-16 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-4 md:px-8 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="md:hidden text-3xl text-gray-700 dark:text-gray-300 p-2">
            <i class="fas fa-bars"></i>
          </button>
          <h2 id="pageTitle" class="text-xl md:text-2xl font-semibold">Dashboard</h2>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800">
            <i class="fas fa-moon text-xl dark:hidden"></i>
            <i class="fas fa-sun text-xl hidden dark:block"></i>
          </button>
          <div class="flex items-center gap-3">
            <span id="userName" class="font-medium">Justice</span>
            <div class="w-9 h-9 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">J</div>
          </div>
        </div>
      </header>
      <main class="flex-1 p-4 md:p-8 overflow-auto" id="mainContent"></main>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="taskModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-900 rounded-3xl w-full max-w-lg p-6 md:p-8">
      <h3 id="modalTitle" class="text-2xl font-semibold mb-6">Add New Task</h3>
     
      <div class="space-y-5">
        <input id="taskTitle" type="text" class="w-full px-5 py-4 rounded-2xl border dark:border-gray-700" placeholder="Task title">
       
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium mb-1">Deadline</label>
            <input id="taskDeadline" type="date" class="w-full px-5 py-4 rounded-2xl border dark:border-gray-700">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Priority</label>
            <select id="taskPriority" class="w-full px-5 py-4 rounded-2xl border dark:border-gray-700">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Category</label>
          <select id="taskCategory" class="w-full px-5 py-4 rounded-2xl border dark:border-gray-700">
            <option value="Assignment">Assignment</option>
            <option value="Exam">Exam</option>
            <option value="Reading">Reading</option>
            <option value="Revision">Revision</option>
            <option value="Project">Project</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border dark:border-gray-700">Cancel</button>
        <button onclick="saveTask()" class="flex-1 py-4 rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700">Save Task</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
