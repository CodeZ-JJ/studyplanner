<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyPlan - Smart Study Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-gray-50 dark:bg-gray-950">

  <!-- Login Page (same as before) -->
  <div id="loginPage" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-600">
    <div class="bg-white dark:bg-gray-900 p-10 rounded-3xl shadow-2xl w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-indigo-600">📚 StudyPlan</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-3">Smart Digital Study Planner</p>
      </div>
      <input id="loginEmail" type="email" value="justice@student.edu.ng" class="w-full px-5 py-4 rounded-2xl border mb-4"/>
      <input id="loginPassword" type="password" value="123456" class="w-full px-5 py-4 rounded-2xl border mb-6"/>
      <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-semibold text-lg">Login</button>
      <p class="text-center text-sm text-gray-500 mt-6">Demo: justice@student.edu.ng / 123456</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="hidden flex h-screen">
    <!-- Sidebar -->
    <div class="w-72 bg-white dark:bg-gray-900 border-r flex flex-col">
      <div class="p-6 border-b">
        <h1 class="text-3xl font-bold text-indigo-600">📚 StudyPlan</h1>
      </div>
      
      <nav class="flex-1 p-4">
        <ul class="space-y-1">
          <li><a onclick="navigate('dashboard')" class="nav-link active flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-home"></i> Dashboard</a></li>
          <li><a onclick="navigate('today')" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-calendar-day"></i> Today's Tasks</a></li>
          <li><a onclick="navigate('schedule')" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-calendar-week"></i> Weekly Schedule</a></li>
          <li><a onclick="navigate('all')" class="nav-link flex items-center gap-3 px-5 py-3 rounded-2xl"> <i class="fas fa-tasks"></i> All Tasks</a></li>
        </ul>
      </nav>

      <div class="p-6 border-t">
        <div class="bg-indigo-50 dark:bg-indigo-950 rounded-2xl p-4 text-center">
          <p class="text-sm text-indigo-600">Current Streak</p>
          <p id="streak" class="text-4xl font-bold text-indigo-600">8 days 🔥</p>
        </div>
      </div>
    </div>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col">
      <header class="h-16 border-b bg-white dark:bg-gray-900 px-8 flex items-center justify-between">
        <h2 id="pageTitle" class="text-2xl font-semibold">Dashboard</h2>
        <div class="flex items-center gap-4">
          <button onclick="toggleDarkMode()" class="p-3 rounded-2xl hover:bg-gray-100">🌙</button>
          <div class="flex items-center gap-3">
            <span class="font-medium">Justice</span>
            <div class="w-9 h-9 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">J</div>
          </div>
        </div>
      </header>

      <main class="flex-1 p-8 overflow-auto" id="mainContent"></main>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="taskModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-900 rounded-3xl w-full max-w-lg p-8">
      <h3 id="modalTitle" class="text-2xl font-semibold mb-6">Add New Task</h3>
      
      <input id="taskId" type="hidden">
      <div class="space-y-5">
        <input id="taskTitle" type="text" class="w-full px-5 py-4 rounded-2xl border" placeholder="Task title">
        
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="text-sm font-medium">Deadline</label>
            <input id="taskDeadline" type="date" class="w-full px-5 py-4 rounded-2xl border mt-1">
          </div>
          <div>
            <label class="text-sm font-medium">Priority</label>
            <select id="taskPriority" class="w-full px-5 py-4 rounded-2xl border mt-1">
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
        </div>

        <div>
          <label class="text-sm font-medium">Category</label>
          <select id="taskCategory" class="w-full px-5 py-4 rounded-2xl border mt-1">
            <option value="Assignment">Assignment</option>
            <option value="Exam">Exam</option>
            <option value="Reading">Reading</option>
            <option value="Revision">Revision</option>
            <option value="Project">Project</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="flex gap-4 mt-8">
        <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border">Cancel</button>
        <button onclick="saveTask()" class="flex-1 py-4 rounded-2xl bg-indigo-600 text-white">Save Task</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
